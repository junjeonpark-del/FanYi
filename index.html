<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 实时翻译聊天室</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 1. 强制 body 撑满全屏，不准全身滚动 */
body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    padding: 0;
    background-color: #121212; /* 深色背景 */
    color: white;
    font-family: sans-serif;
    overflow: hidden; 
}

/* 2. 头部固定高度 */
#header {
    padding: 10px;
    background: #1f1f1f;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 3. 聊天区域：flex: 1 自动占满中间，内容多了自动出滚动条 */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* 4. 底部输入区：永远钉在屏幕最下面 */
#controls {
    padding: 10px;
    background: #1f1f1f;
    border-top: 1px solid #333;
    display: flex;
    gap: 8px;
}

/* 输入框和下拉框的样式 */
input, select {
    background: #333;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
}

input { flex: 1; } /* 让输入框占满横向剩余空间 */
        
/* 1. 基础气泡容器 */
.msg {
    max-width: 80%;
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 18px;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    word-wrap: break-word;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    color: white;
}

/* 2. 我发送的消息（右侧，蓝色） */
.me {
    align-self: flex-end;
    background-color: #007AFF;
    border-bottom-right-radius: 2px;
}

/* 3. 别人发送的消息（左侧，深灰） */
.them {
    align-self: flex-start;
    background-color: #333;
    border-bottom-left-radius: 2px;
}

/* 4. 下面那个带线的小字（原文） */
.lang-tag {
    display: block;
    font-size: 13px;
    margin-top: 5px;
    opacity: 0.8;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 4px;
}
    </style>

</head>
<body>

<div id="header">
    <div>
        <select id="my-lang">
            <option value="zh-CN">我讲中文</option>
            <option value="ko-KR">한국어</option>
            <option value="en-US">English</option>
        </select>
        <span> ➔ </span>
        <select id="target-lang">
            <option value="English">看英文</option>
            <option value="Chinese">看中文</option>
            <option value="Korean">看韩文</option>
        </select>
    </div>
    <button onclick="showQR()" style="border-radius: 5px; font-size: 12px;">扫码加入</button>
</div>

<div id="chat-box"></div>

<div id="controls">
    <input type="text" id="text-input" placeholder="输入文字..." onkeypress="if(event.key==='Enter') sendText()">
    <button id="mic-btn" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">🎤</button>
</div>

<div id="qr-modal" onclick="this.style.display='none'">
    <div id="qrcode" style="background: white; padding: 20px; border-radius: 10px;"></div>
    <p style="margin-top: 20px;">让对方扫码加入房间</p>
</div>

    
<script>
    var recognition;
    // --- 1. Firebase 配置 (保持不变) ---
    const firebaseConfig = {
        apiKey: "AIzaSyA6PDYEk7Epsu52maMlVSzzv5f_yMkcjFg",
        authDomain: "fanyi-6e1bf.firebaseapp.com",
        databaseURL: "https://fanyi-6e1bf-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanyi-6e1bf",
        storageBucket: "fanyi-6e1bf.firebasestorage.app",
        messagingSenderId: "794186472934",
        appId: "1:794186472934:web:54c39fda3a6ec5fe84ca27",
        measurementId: "G-P7K3JG97BJ"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const roomId = window.location.hash || "#room_" + Math.random().toString(36).substr(2, 5);
    window.location.hash = roomId;
    const chatRef = database.ref('rooms/' + roomId.replace('#', ''));

   // --- 2. 语音识别 (适配 Safari + 修复双重发送) ---

function startMic() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("浏览器不支持语音，请用 Safari 或 Chrome");
        return;
    }

    // 【关键】每次按下按钮都重新创建录音机，Safari 才会听话
    recognition = new SpeechRecognition();
    recognition.lang = document.getElementById('my-lang').value;
    recognition.continuous = false;
    recognition.interimResults = false;

    // 录音开始
    recognition.onstart = function() {
        document.getElementById('mic-btn').innerHTML = "🔴";
    };

    // 录音结果：只把字写进输入框，不自动发送
    recognition.onresult = function(event) {
        var text = event.results[0][0].transcript;
        document.getElementById('text-input').value = text;
    };

    // 录音结束
    recognition.onend = function() {
        document.getElementById('mic-btn').innerHTML = "🎤";
    };

    try {
        recognition.start();
    } catch (e) {
        console.log("语音启动失败:", e);
    }
}

function stopMic() {
    if (recognition) {
        recognition.stop();
    }
}
    // --- 3. 二维码功能 (找回来了！) ---
    function showQR() {
        // 让弹窗显示出来
        document.getElementById('qr-modal').style.display = 'flex';
        // 清空旧的二维码
        document.getElementById('qrcode').innerHTML = "";
        // 生成新的二维码，指向当前页面的 URL
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // --- 4. 翻译逻辑 (Groq API) ---
    async function translateText(text, targetLang) {
        const GROQ_API_KEY = "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";
        const url = "https://api.groq.com/openai/v1/chat/completions";
        const payload = {
            model: "llama-3.3-70b-versatile",
            messages: [
                { role: "system", content: `You are a professional translator. Translate to ${targetLang}. Return ONLY the translated text.` },
                { role: "user", content: text }
            ],
            temperature: 0.1
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + GROQ_API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            return data.choices[0].message.content.trim();
        } catch (e) {
            return "[翻译出错]";
        }
    }

    // --- 5. 发送与消息展示 ---
    async function processAndSend(rawText) {
        if (!rawText) return;
        const targetValue = document.getElementById('target-lang').value; 
        // 映射下拉框的值到 Groq 识别的语言名
        const langMap = { "English": "English", "Chinese": "Chinese", "Korean": "Korean" };
        const targetLang = langMap[targetValue] || targetValue;

        const translated = await translateText(rawText, targetLang);
        
        chatRef.push({
            senderId: localStorage.getItem('userId') || (localStorage.setItem('userId', Date.now()), Date.now()),
            original: rawText,
            translated: translated,
            timestamp: Date.now()
        });
    }

    function sendText() {
        const input = document.getElementById('text-input');
        processAndSend(input.value);
        input.value = "";
    }

// --- 6. 实时监听新消息 (核心：让聊天动起来) ---
    chatRef.limitToLast(20).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const box = document.getElementById('chat-box');
        
        // 获取或生成自己的 ID
        let userId = localStorage.getItem('userId');
        if (!userId) {
            userId = Date.now().toString();
            localStorage.setItem('userId', userId);
        }
        
        const isMe = data.senderId == userId;
        
        // 创建消息气泡
        const msgDiv = document.createElement('div');
        // 根据是不是自己发的，应用不同的 CSS 类（me 或 them）
        msgDiv.className = `msg ${isMe ? 'me' : 'them'}`;
        
        // 气泡内部：翻译的大字 + 原文的小字
        msgDiv.innerHTML = `
            ${data.translated}
            <span class="lang-tag">${data.original}</span>
        `;
        
        // 添加到聊天框并自动滚动到底部
        box.appendChild(msgDiv);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
