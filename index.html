<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 实时翻译聊天室</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 1. 强制 body 撑满全屏，不准全身滚动 */
body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    padding: 0;
    background-color: #121212; /* 深色背景 */
    color: white;
    font-family: sans-serif;
    overflow: hidden; 
}

/* 2. 头部固定高度 */
#header {
    padding: 10px;
    background: #1f1f1f;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 3. 聊天区域：flex: 1 自动占满中间，内容多了自动出滚动条 */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* 4. 底部输入区：永远钉在屏幕最下面 */
#controls {
    padding: 10px;
    background: #1f1f1f;
    border-top: 1px solid #333;
    display: flex;
    gap: 8px;
}

/* 输入框和下拉框的样式 */
input, select {
    background: #333;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
}

input { flex: 1; } /* 让输入框占满横向剩余空间 */
        
/* 1. 基础气泡容器 */
.msg {
    max-width: 80%;
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 18px;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    word-wrap: break-word;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    color: white;
}

/* 2. 我发送的消息（右侧，蓝色） */
.me {
    align-self: flex-end;
    background-color: #007AFF;
    border-bottom-right-radius: 2px;
}

/* 3. 别人发送的消息（左侧，深灰） */
.them {
    align-self: flex-start;
    background-color: #333;
    border-bottom-left-radius: 2px;
}

/* 4. 下面那个带线的小字（原文） */
.lang-tag {
    display: block;
    font-size: 13px;
    margin-top: 5px;
    opacity: 0.8;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 4px;
}
    </style>

</head>
<body>

<div id="header">
    <div>
        <select id="my-lang">
            <option value="zh-CN">我讲中文</option>
            <option value="ko-KR">한국어</option>
            <option value="en-US">English</option>
        </select>
        <span> ➔ </span>
        <select id="target-lang">
            <option value="English">看英文</option>
            <option value="Chinese">看中文</option>
            <option value="Korean">看韩文</option>
        </select>
    </div>
    <button onclick="showQR()" style="border-radius: 5px; font-size: 12px;">扫码加入</button>
</div>

<div id="chat-box"></div>

<div id="controls">
    <input type="text" id="text-input" placeholder="输入文字..." onkeypress="if(event.key==='Enter') sendText()">
    <button id="mic-btn" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">🎤</button>
</div>

<div id="qr-modal" onclick="this.style.display='none'">
    <div id="qrcode" style="background: white; padding: 20px; border-radius: 10px;"></div>
    <p style="margin-top: 20px;">让对方扫码加入房间</p>
</div>

let recognition;
    
<script>
    // --- 配置区 (请填写你的信息) ---
    const GEMINI_API_KEY = "";
    const firebaseConfig = {
        apiKey: "AIzaSyA6PDYEk7Epsu52maMlVSzzv5f_yMkcjFg",
        authDomain: "fanyi-6e1bf.firebaseapp.com",
        databaseURL: "https://fanyi-6e1bf-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fanyi-6e1bf",
        storageBucket: "fanyi-6e1bf.firebasestorage.app",
        messagingSenderId: "794186472934",
        appId: "1:794186472934:web:54c39fda3a6ec5fe84ca27",
        measurementId: "G-P7K3JG97BJ"
    };
    // ----------------------------

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const roomId = window.location.hash || "#room_" + Math.random().toString(36).substr(2, 5);
    window.location.hash = roomId;
    const chatRef = database.ref('rooms/' + roomId.replace('#', ''));

// 157. 语音识别逻辑

// 2. 按下按钮时触发：开始录音
function startMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("浏览器不支持语音");
        return;
    }

    // 创建实例
    recognition = new SpeechRecognition();
    
    // 获取当前语言
    const langSelect = document.getElementById('my-lang');
    recognition.lang = langSelect ? langSelect.value : 'zh-CN';

    recognition.onstart = () => {
        const btn = document.getElementById('voice-btn');
        if(btn) btn.innerHTML = "🔴 录音中";
    };

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('message-input').value = text;
    };

    recognition.onerror = (e) => {
        console.error("语音错误:", e.error);
    };

    // 启动
    recognition.start();
}

// 3. 松开按钮时触发：停止录音
function stopMic() {
    if (recognition) {
        recognition.stop();
        const btn = document.getElementById('voice-btn');
        if(btn) btn.innerHTML = "🎤";
    }
}
    // 显示二维码
    function showQR() {
        document.getElementById('qr-modal').style.display = 'flex';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), window.location.href);
    }

    // 调用 groq 翻译
    async function translateText(text, targetLang) {
    // 【核心配置】直接填入你的 Groq Key
    const GROQ_API_KEY = "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";
    const url = "https://api.groq.com/openai/v1/chat/completions";

    const payload = {
        model: "llama-3.3-70b-versatile", // Groq 推荐的高性能模型
        messages: [
            {
                role: "system",
                content: `You are a professional translator. Translate to ${targetLang}. Return ONLY the translated text.`
            },
            {
                role: "user",
                content: text
            }
        ],
        temperature: 0.1 // 越低越精准
    };

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + GROQ_API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.status !== 200) {
            console.error("Groq 报错:", data);
            return "[Groq 错误: " + (data.error ? data.error.message : response.status) + "]";
        }

        return data.choices[0].message.content.trim();
    } catch (e) {
        console.error("网络异常:", e);
        return "[网络连接超时]";
    }
}
    // 处理并发送消息
    async function processAndSend(rawText) {
        if (!rawText) return;
        const targetLang = document.getElementById('target-lang').value;
        const translated = await translateText(rawText, targetLang);
        
        chatRef.push({
            senderId: localStorage.getItem('userId') || (localStorage.setItem('userId', Date.now()), Date.now()),
            original: rawText,
            translated: translated,
            timestamp: Date.now()
        });
    }

    function sendText() {
        const input = document.getElementById('text-input');
        processAndSend(input.value);
        input.value = "";
    }

    function startMic() {
        document.getElementById('mic-btn').classList.add('active');
        recognition.lang = document.getElementById('my-lang').value;
        recognition.start();
    }

    function stopMic() {
        document.getElementById('mic-btn').classList.remove('active');
        recognition.stop();
    }

    // 监听新消息
    chatRef.limitToLast(20).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const box = document.getElementById('chat-box');
        const isMe = data.senderId == localStorage.getItem('userId');
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'me' : 'them'}`;
        msgDiv.innerHTML = `
            ${data.translated}
            <span class="lang-tag">${data.original}</span>
        `;
        box.appendChild(msgDiv);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
